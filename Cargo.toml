[workspace]
members = [
    "stratum-bridge",
    "miner-sidecar",
]
resolver = "2"

[workspace.dependencies]
tokio              = { version = "1",    features = ["full"] }
serde              = { version = "1",    features = ["derive"] }
serde_json         = "1"
anyhow             = "1"
tracing            = "1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
hex                = "0.4"
sha2               = "0.10"
bytes              = "1"
